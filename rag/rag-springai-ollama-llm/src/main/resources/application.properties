spring.application.name=rag-springai-ollama-llm

spring.threads.virtual.enabled=true
spring.mvc.problemdetails.enabled=true

spring.ai.ollama.init.pull-model-strategy=WHEN_MISSING
spring.ai.ollama.init.embedding.additional-models[0]=mxbai-embed-large
spring.ai.ollama.init.embedding.additional-models[1]=llama3.2:1b
spring.ai.ollama.init.timeout=15m
spring.ai.ollama.chat.model=mistral
spring.ai.ollama.chat.keep-alive=30m
spring.ai.ollama.chat.temperature=0.2
spring.ai.ollama.chat.top-k=2
spring.ai.ollama.chat.top-p=0.2

#PgVector
spring.ai.vectorstore.observations.log-query-response=true
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.schema-validation=true
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.table-name=vector_store

# HNSW Index Configuration
spring.ai.vectorstore.pgvector.index-type=HNSW
# m: Max number of connections per layer (typical: 16 to 64)
# ef_construction: Size of the dynamic candidate list for constructing the graph (typical: 64 to 128)

spring.http.clients.connect-timeout=PT1M
spring.http.clients.read-timeout=PT5M

spring.testcontainers.beans.startup=parallel

##Observability
spring.ai.chat.observations.log-completion=true
spring.ai.chat.observations.log-prompt=true
spring.ai.chat.client.observations.log-prompt=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.service.name=${spring.application.name}
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.otlp.metrics.export.step=30s

logging.level.org.springframework.ai.rag=info

# Hybrid Retrieval Configuration
# values: vector, keyword, hybrid
rag.retrieval.mode=hybrid
rag.retrieval.similarityThreshold=0.60
# default: 3
rag.retrieval.keyword.topK=1
# RRF constant; default: 60
rag.retrieval.rrf.k=60
# final result count after fusion; default: 3
rag.retrieval.hybrid.topK=1

# Guardrails
guardrails.sensitive-words=politics,religion,violence,hate speech,explicit content
guardrails.failure-message=I'm sorry, but I cannot assist with that topic. Please ask a question related to customer support.
guardrails.logging.enabled=true

# Chunking Strategy
rag.chunking.strategy=token
rag.chunking.section.pattern=(^#+\\s+.*$)|(\\n\\n)

# Reranking Strategy
rag.retrieval.rerank.enabled=true
rag.retrieval.rerank.topK=3

# Caching Configuration
rag.cache.enabled=true
rag.cache.ttl-seconds=3600
rag.cache.max-size=1000

# Query Transformation Configuration
rag.query.multiquery.enabled=false
rag.query.multiquery.variations=2
rag.query.self-querying-enabled=true
# Dedicated model for MultiQueryExpander and QueryAnalyzer (lighter/faster than the main model)
rag.query.model=llama3.2:1b