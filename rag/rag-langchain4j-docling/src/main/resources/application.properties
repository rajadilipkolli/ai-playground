spring.application.name=rag-langchain4j-docling

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/doclingdb
spring.datasource.username=doclinguser
spring.datasource.password=doclingpass
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

# Docling configuration
docling.server.url=http://localhost:5001

# LangChain4j properties
langchain4j.rag.chunking.size=300
langchain4j.rag.chunking.overlap=50
