services:
  docling-serve:
    image: dslim/docling-serve:latest
    ports:
      - "5001:5001"
    environment:
      - WORKERS=4
    # healthcheck details depending on the docling-serve image spec

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=doclinguser
      - POSTGRES_PASSWORD=doclingpass
      - POSTGRES_DB=doclingdb
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U doclinguser -d doclingdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
