spring.application.name=agent-ollama-springai

# Ollama Init & Chat Model Setup
spring.ai.ollama.init.pull-model-strategy=always
spring.ai.ollama.init.timeout=15m
spring.ai.ollama.chat.model=llama3.1
spring.ai.ollama.chat.temperature=0.0
spring.ai.ollama.chat.top-k=10
spring.ai.ollama.chat.top-p=0.5
spring.ai.ollama.chat.keep-alive=5m

# HTTP Client Timeouts
spring.http.clients.connect-timeout=5s
spring.http.clients.read-timeout=300s

# JDBC Chat Memory Schema Ownership (Liquibase manages DDL)
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000

# Spring AI Built-in Retry (only transient errors)
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=1000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=10000
spring.ai.retry.on-client-errors=false

# Observability (Actuator & OTLP)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.tracing.sampling.probability=1.0
management.metrics.tags.service.name=${spring.application.name}

# Default to http://localhost:4318 for OTLP HTTP exports
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics

# Spring AI Observations
spring.ai.chat.client.observations.log-completion=true
spring.ai.chat.client.observations.log-prompt=true
